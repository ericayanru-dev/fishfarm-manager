<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/meduim.css">
    <link rel="stylesheet" href="styles/mobile.css">
    <link rel="stylesheet" href="styles/desktop.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <script type="module"  src="scripts/main.js"></script>
</head>
<body id="dark-theme">
    <aside class="site-nav">
        <button class="sidebar-toggle" >
            <span class="material-symbols-rounded">
            menu
            </span>
        </button>
    </aside>
    <div class="app-layout">
    <header>
        <aside class="sidebar-header">
            <div class="logo">
            <span class="name">fish farm managment</span>
            </div>
            <button class="sidebar-toggle">
                <span class="material-symbols-rounded">
                chevron_left
                </span>
            </button>
        </aside>
        <nav id="sidebar" class="sidebar">
            <form action="#" class="search-form" id="searchForm">
                <label for="search">
                    <span class="material-symbols-rounded">search</span>
                    <input type="search" id="search" name="search" placeholder="search" required>
                </label>
            </form>
            <div class="menu-list">

                <!-- Dashboard -->
                <button class="menu-item" type="button" data-page="dashboard">
                    <span class="material-symbols-rounded">dashboard</span>
                    <span class="menu-label">Dashboard</span>
                </button>

                <!-- Expenses (Group Header) -->
                <div class="menu-group ">

                    <button class="menu-item menu-parent" type="button">
                        <span class="material-symbols-rounded">payments</span>
                        <span class="menu-label">Expenses</span>
                    </button>

                    <div class="menu-sublist">

                        <!-- Capital Expenses -->
                        <button class="menu-item submenu" type="button" data-page="capital-expenses">
                            <span class="material-symbols-rounded">account_balance</span>
                            <span class="menu-label">Capital Expenses</span>
                        </button>

                        <!-- Production Expenses -->
                        <button class="menu-item submenu menu-parent" type="button">
                            <span class="material-symbols-rounded">factory</span>
                            <span class="menu-label">Production Expenses</span>
                        </button>

                        <div class="menu-sublist nested">

                            <button class="menu-item submenu" type="button" data-page="fish">
                                <span class="material-symbols-rounded">set_meal</span>
                                <span class="menu-label">Fish Stock</span>
                            </button>

                            <button class="menu-item submenu" type="button" data-page="feed">
                                <span class="material-symbols-rounded">inventory_2</span>
                                <span class="menu-label">Feed Stock</span>
                            </button>

                            <button class="menu-item submenu" type="button" data-page="other-expenses">
                                <span class="material-symbols-rounded">more_horiz</span>
                                <span class="menu-label">Other</span>
                            </button>

                        </div>
                    </div>
                </div>

                <!-- Mortality -->
                <button class="menu-item" type="button" data-page="mortality">
                    <span class="material-symbols-rounded">skull</span>
                    <span class="menu-label">Mortality</span>
                </button>

                <!-- Feed Usage -->
                <button class="menu-item" type="button" data-page="usage">
                    <span class="material-symbols-rounded">analytics</span>
                    <span class="menu-label">Feed Usage</span>
                </button>

                <!-- Sales -->
                <button class="menu-item" type="button" data-page="sales">
                    <span class="material-symbols-rounded">point_of_sale</span>
                    <span class="menu-label">Sales</span>
                </button>

                <!-- Reports -->
                <button class="menu-item" type="button" data-page="reports">
                    <span class="material-symbols-rounded">bar_chart</span>
                    <span class="menu-label">Reports</span>
                </button>

            </div>
        </nav>
        <div class="sidebar-footer">
                <button class="theme-toggle" id="theme-toggle">
                    <span class="theme-label">
                        <span class="material-symbols-rounded theme-icon" id="themeIcon">dark_mode</span>
                        <span class="theme-text">Dark Mode</span>
                    </span>
                    <span class="theme-toggle-track">
                        <span class="theme-toggle-indicator"></span>
                    </span>
                </button>
                <span id="navDate">date</span>
            </div>
    </header>

    <main id="main">

    </main>
    
     <footer>
    <small>© Fish Farm Management</small>
  </footer>
    </div>
</body>
</html>
